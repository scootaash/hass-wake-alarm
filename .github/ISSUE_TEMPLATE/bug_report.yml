name: Bug report
description: Something's broken or behaving unexpectedly.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much
        as you can — every section helps narrow it down. If you're not
        sure on something, leave a note and we'll figure it out.

  - type: input
    id: wake_alarm_version
    attributes:
      label: Wake Alarm version
      description: Visible in HACS → Wake Alarm, or in `manifest.json`.
      placeholder: e.g. 0.3.0
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Core version
      description: Settings → About.
      placeholder: e.g. 2025.5.1
    validations:
      required: true

  - type: dropdown
    id: ha_install
    attributes:
      label: How is HA installed?
      options:
        - Home Assistant OS
        - Home Assistant Container
        - Home Assistant Supervised
        - Home Assistant Core (Python venv)
    validations:
      required: true

  - type: input
    id: lights
    attributes:
      label: Light integration(s) used with this alarm
      description: e.g. `light.hue`, `light.zigbee2mqtt`. Doesn't have to be exhaustive.
      placeholder: Philips Hue

  - type: input
    id: media_players
    attributes:
      label: Media player integration(s) used with this alarm
      placeholder: Sonos

  - type: input
    id: phone
    attributes:
      label: Phone + Companion app version (if reporting a notification issue)
      placeholder: iPhone 14 / iOS Companion 2025.5

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the actual behaviour.
    validations:
      required: true

  - type: textarea
    id: what_expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps if you can. Even rough ones help.
      placeholder: |
        1. Set alarm time to 07:00, ramp 5 min, media picked
        2. Wait until 06:55
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Home Assistant Core logs
      description: |
        Settings → System → Logs → "Home Assistant Core". Filter by `wake_alarm`
        and paste anything that looks relevant. Code-fence with triple backticks.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: |
        Screenshots, related automations, your dashboard YAML, things you've
        already tried — anything that might help.
