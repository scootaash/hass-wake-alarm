set_media:
  name: Set media
  description: >
    Persist a media selection for a Wake Alarm instance. Called by the card
    after the user picks media via the browser modal. The selection is
    surfaced via sensor.<slug>_media_selection and used by the music
    sequence at alarm time.
  target:
    entity:
      integration: wake_alarm
  fields:
    media_content_id:
      name: Media Content ID
      description: >
        The media_content_id returned by HA's media browser
        (e.g. FV:2/5 for a Sonos favourite, spotify:playlist:..., or a
        stream URL).
      required: true
      example: "FV:2/5"
      selector:
        text:
    media_content_type:
      name: Media Content Type
      description: >
        The media_content_type returned by HA's media browser
        (e.g. favorite_item_id, playlist, music, url).
      required: true
      example: "favorite_item_id"
      selector:
        text:
    title:
      name: Title
      description: Friendly title shown in the card and used as the sensor's state.
      required: true
      example: "Morning Wake Up Mix"
      selector:
        text:
    thumbnail:
      name: Thumbnail URL
      description: Optional thumbnail URL for display in the card.
      required: false
      example: "https://example.com/cover.jpg"
      selector:
        text:

snooze:
  name: Snooze
  description: >
    Snooze the alarm. Pauses any active music, cancels the ramp, and
    starts a snooze timer for the configured snooze_min minutes.
  target:
    entity:
      integration: wake_alarm

dismiss:
  name: Dismiss
  description: >
    Fully dismiss the alarm. Stops music, unjoins any group, cancels every
    pending task or timer, and recomputes the next fire time. Lights are
    left as the user has them.
  target:
    entity:
      integration: wake_alarm

cancel_ramp:
  name: Cancel ramp
  description: >
    Stop the light ramp without dismissing the alarm. Music will still
    play at alarm_time.
  target:
    entity:
      integration: wake_alarm

test_light_ramp:
  name: Test light ramp
  description: >
    Run the light ramp now using current settings, regardless of schedule.
  target:
    entity:
      integration: wake_alarm

test_music:
  name: Test music
  description: >
    Run the music sequence now using current settings and the selected
    media. Aborts with a log warning if no media has been picked.
  target:
    entity:
      integration: wake_alarm

test_standard_notification:
  name: Test standard notification
  description: >
    Send the standard alarm notification right now so you can verify
    the configured notify target, sound, and on-device interruption
    level (iOS active / Android default channel).
  target:
    entity:
      integration: wake_alarm

test_urgent_notification:
  name: Test urgent notification
  description: >
    Send the urgent fallback notification right now. Uses the iOS
    critical-alert sound + critical interruption level and the Android
    wake_alarm_urgent channel so you can verify a distinct alert sound
    versus the standard notification.
  target:
    entity:
      integration: wake_alarm
