[tool.pytest.ini_options]
testpaths = ["tests"]
# auto: HA-backed async tests don't each need an explicit asyncio marker, and
# the existing pure tests are synchronous so they're unaffected.
asyncio_mode = "auto"
# Intentionally NOT treating all warnings as errors: across the HA version
# matrix each release emits a different set of deprecation warnings, which
# would make "error" an unmaintainable, version-coupled gate. We still surface
# warnings in the report, just don't fail on them.
filterwarnings = [
  "default",
  "ignore::DeprecationWarning",
]

[tool.coverage.run]
# Measure the integration package (the coordinator/state machine is what we
# care about). Branch coverage flags un-taken if/else paths, not just lines.
source = ["custom_components/wake_alarm"]
branch = true

[tool.coverage.report]
show_missing = true
# Advisory only for now: CI prints the number and the untested lines so blind
# spots are visible on every run, but there's no enforced minimum threshold.

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
# Conservative, high-signal rule set: pycodestyle errors/warnings, pyflakes,
# and import sorting. Kept deliberately small so the hard gate stays bounded.
select = ["E", "F", "W", "I"]
